<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bedazzled – Fragen-Verwaltung</title>
<link rel="icon" type="image/png" href="logo.png" />
<link rel="stylesheet" href="style.css" />
<style>
  #admin-app { max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; }
  .q-row { background: var(--night-2); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
  .q-row .q-text { font-weight: 600; margin-bottom: 4px; }
  .q-row .q-topic-tag { display: inline-block; font-size: 11px; color: var(--gold); background: rgba(172,88,249,0.12); padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .q-text-edit, .a-text-edit { width: 100%; margin-bottom: 8px; }
  .q-row .a-text { color: var(--teal); font-size: 14px; }
  .q-row .row-actions { display: flex; gap: 8px; margin-top: 10px; }
  .row-actions button { flex: none; width: auto; padding: 8px 14px; font-size: 13px; }
  .section-title { font-family: var(--font-display); font-size: 20px; margin: 28px 0 12px; }
  textarea#bulk-import { min-height: 140px; }
  .count-badge { color: var(--ink-dim); font-size: 13px; margin-bottom: 14px; }
  #login-box { max-width: 360px; margin: 80px auto; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.12); background: var(--night-2); color: var(--ink-dim); font-weight: 700; cursor: pointer; font-family: var(--font-body); font-size: 14px; }
  .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(242,183,5,0.08); }

  .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .filter-bar select, .filter-bar input {
    background: var(--night-2); border: 1.5px solid rgba(172,88,249,0.25); color: var(--ink);
    border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: var(--font-body);
  }
  .filter-bar select { flex: 1; min-width: 160px; }
  .filter-bar input[type="search"] { flex: 2; min-width: 200px; }

  .category-group { margin-bottom: 12px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
  .category-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; background: var(--night-2); cursor: pointer; user-select: none;
  }
  .category-header .cat-name { font-weight: 700; font-family: var(--font-display); font-size: 16px; }
  .category-header .cat-count { font-size: 12px; color: var(--ink-dim); background: rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 20px; margin-left: 8px; }
  .category-header .chevron { color: var(--gold); transition: transform 0.2s ease; font-size: 14px; }
  .category-header.open .chevron { transform: rotate(90deg); }
  .category-body { padding: 10px; display: none; }
  .category-body.open { display: block; }
  .category-select { margin-bottom: 8px; }
  .field-row { display: flex; gap: 8px; }
  .field-row > * { flex: 1; }
</style>
</head>
<body>

<div id="admin-app">

  <div id="login-box" class="card">
    <h1 style="font-size:24px; margin-bottom:14px;">🔑 Fragen-Verwaltung</h1>
    <label>Zugangscode</label>
    <input id="input-key" type="password" placeholder="Zugangscode" />
    <button id="btn-login" class="btn btn-primary">Anmelden</button>
    <p id="login-error" class="error"></p>
  </div>

  <div id="main-box" class="hidden">
    <h1 style="font-size:26px;">Fragen-Verwaltung</h1>

    <div class="tabs">
      <button id="tab-bluff" class="tab-btn active">🎭 Bluff-Fragen</button>
      <button id="tab-estimate" class="tab-btn">🔢 Schätzen-Fragen</button>
    </div>

    <p class="count-badge"><span id="q-count">0</span> Fragen aktuell hinterlegt, <span id="q-count-filtered">0</span> nach Filter sichtbar</p>
    <p class="count-badge" id="storage-status-badge">Speicherort wird geprüft …</p>

    <div class="card">
      <h2 class="section-title" style="margin-top:0;">Neue Frage hinzufügen</h2>
      <div class="field-row">
        <div>
          <label id="category-label">Kategorie</label>
          <select id="new-category" class="category-select"></select>
        </div>
        <div>
          <label>Thema</label>
          <select id="new-topic" class="category-select"></select>
        </div>
      </div>
      <label>Frage</label>
      <textarea id="new-question" placeholder="z.B. Warum tragen Schweizer Kühe große Glocken?"></textarea>
      <label id="new-answer-label">Echte Antwort</label>
      <textarea id="new-answer" placeholder="Die tatsächliche, ungewöhnliche Antwort"></textarea>
      <input id="new-answer-number" type="number" step="any" class="hidden" placeholder="Die echte Zahl" />
      <button id="btn-add-question" class="btn btn-primary">Frage hinzufügen</button>
    </div>

    <h2 class="section-title">Massen-Import</h2>
    <div class="card">
      <p class="hint" style="margin-top:0;" id="import-format-hint">Ein Eintrag pro Zeile im Format <code>Kategorie;Thema;Frage;Antwort</code>:</p>
      <textarea id="bulk-import" placeholder="Kuriositäten;Tiere & Natur;Frage 1?;Antwort 1&#10;Fremdwörter;Sprache & Wortschatz;Frage 2?;Antwort 2"></textarea>
      <button id="btn-import" class="btn btn-secondary">Import starten</button>
      <p id="import-result" class="hint"></p>
    </div>

    <h2 class="section-title">Filter &amp; Suche</h2>
    <div class="filter-bar">
      <select id="filter-category">
        <option value="">Alle Kategorien</option>
      </select>
      <select id="filter-topic">
        <option value="">Alle Themen</option>
      </select>
      <input id="filter-search" type="search" placeholder="🔍 Volltextsuche in Frage/Antwort …" />
    </div>

    <h2 class="section-title">Fragen nach Thema</h2>
    <button id="btn-export" class="btn btn-secondary" style="margin-bottom:16px;">📥 Als Datei herunterladen</button>
    <div id="category-groups"></div>
  </div>

</div>

<script>
  let adminKey = sessionStorage.getItem('bedazzled_admin_key') || '';
  let questions = [];
  let category = 'bluff'; // 'bluff' | 'estimate'
  let openTopics = new Set();
  let filterCategory = '';
  let filterTopic = '';
  let filterSearch = '';
  const DEFAULT_CATEGORY = 'Sonstige';
  const DEFAULT_TOPIC = 'Sonstiges';

  // Feste Grund-Kategorien (die drei Haupt-Kategorien des Spiels)
  const BASE_CATEGORIES = ['Kuriositäten', 'Fremdwörter', 'Historischer Kontext'];

  // Feste, erweiterte Themenliste - steht immer komplett zur Auswahl, auch wenn noch keine
  // Frage mit diesem Thema existiert (für künftige Fragen-Batches gedacht)
  const BASE_TOPICS = [
    'Tiere & Natur',
    'Wissenschaft & Forschung',
    'Kunst & Kultur',
    'Militär & Kriegsführung',
    'Herrscher & Politik',
    'Aberglaube & Bräuche',
    'Essen & Trinken',
    'Spiele & Freizeit',
    'Psychologie & Phobien',
    'Alltag & Technik',
    'Schifffahrt & Entdeckung',
    'Sprache & Wortschatz',
    'Architektur',
    'Geographie & Länder',
    'Weltraum & Astronomie',
    'Musik',
    'Film & Fernsehen',
    'Sport',
    'Mode & Design',
    'Medizin & Gesundheit',
    'Erfindungen & Entdeckungen',
    'Mythologie & Legenden',
    'Verkehr & Mobilität',
    'Wirtschaft & Handel',
  ];

  const loginBox = document.getElementById('login-box');
  const mainBox = document.getElementById('main-box');

  function apiBase() {
    return category === 'estimate' ? '/api/estimate-questions' : '/api/questions';
  }

  async function apiCall(path, options = {}) {
    const url = path + (path.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(adminKey);
    const res = await fetch(url, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    });
    if (res.status === 401) throw new Error('UNAUTHORIZED');
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || 'Unbekannter Fehler');
    }
    return res.json();
  }

  async function loadQuestions() {
    try {
      questions = await apiCall(apiBase());
      renderQuestions();
      loginBox.classList.add('hidden');
      mainBox.classList.remove('hidden');
      try {
        const status = await apiCall('/api/storage-status');
        document.getElementById('storage-status-badge').textContent = status.usingMongo
          ? '💾 Speicherort: MongoDB Atlas (dauerhaft, übersteht Deploys)'
          : '⚠️ Speicherort: lokale Datei (wird bei nächstem Deploy zurückgesetzt, sofern nicht neu hochgeladen)';
      } catch (e) { /* Status ist nicht kritisch, einfach ignorieren falls nicht verfügbar */ }
    } catch (e) {
      if (e.message === 'UNAUTHORIZED') {
        sessionStorage.removeItem('bedazzled_admin_key');
        document.getElementById('login-error').textContent = 'Falscher Zugangscode.';
        loginBox.classList.remove('hidden');
        mainBox.classList.add('hidden');
      } else {
        document.getElementById('login-error').textContent = e.message;
      }
    }
  }

  document.getElementById('btn-login').addEventListener('click', () => {
    adminKey = document.getElementById('input-key').value.trim();
    sessionStorage.setItem('bedazzled_admin_key', adminKey);
    loadQuestions();
  });

  function setCategory(cat) {
    category = cat;
    openTopics = new Set();
    filterCategory = ''; filterTopic = ''; filterSearch = '';
    document.getElementById('filter-search').value = '';
    document.getElementById('tab-bluff').classList.toggle('active', cat === 'bluff');
    document.getElementById('tab-estimate').classList.toggle('active', cat === 'estimate');
    document.getElementById('new-answer-label').textContent = cat === 'estimate' ? 'Echte Zahl' : 'Echte Antwort';
    document.getElementById('new-answer').classList.toggle('hidden', cat === 'estimate');
    document.getElementById('new-answer-number').classList.toggle('hidden', cat !== 'estimate');
    document.getElementById('import-format-hint').innerHTML = cat === 'estimate'
      ? 'Ein Eintrag pro Zeile im Format <code>Kategorie;Thema;Frage;Zahl</code>:'
      : 'Ein Eintrag pro Zeile im Format <code>Kategorie;Thema;Frage;Antwort</code>:';
    if (adminKey) loadQuestions();
  }
  document.getElementById('tab-bluff').addEventListener('click', () => setCategory('bluff'));
  document.getElementById('tab-estimate').addEventListener('click', () => setCategory('estimate'));

  document.getElementById('filter-category').addEventListener('change', (e) => { filterCategory = e.target.value; renderQuestions(); });
  document.getElementById('filter-topic').addEventListener('change', (e) => { filterTopic = e.target.value; renderQuestions(); });
  document.getElementById('filter-search').addEventListener('input', (e) => { filterSearch = e.target.value.toLowerCase(); renderQuestions(); });

  function applyFilters(list) {
    return list.filter(q => {
      if (filterCategory && (q.category || DEFAULT_CATEGORY) !== filterCategory) return false;
      if (filterTopic && (q.topic || DEFAULT_TOPIC) !== filterTopic) return false;
      if (filterSearch) {
        const hay = (q.question + ' ' + q.answer).toLowerCase();
        if (!hay.includes(filterSearch)) return false;
      }
      return true;
    });
  }

  function groupByTopic(list) {
    const groups = {};
    list.forEach((q, idx) => {
      const topic = q.topic || DEFAULT_TOPIC;
      if (!groups[topic]) groups[topic] = [];
      groups[topic].push({ ...q, _idx: idx });
    });
    return groups;
  }

  function renderQuestions() {
    document.getElementById('q-count').textContent = questions.length;

    const categoryNames = [...new Set([...BASE_CATEGORIES, ...questions.map(q => q.category || DEFAULT_CATEGORY)])].sort();
    const topicNames = [...new Set([...BASE_TOPICS, ...questions.map(q => q.topic || DEFAULT_TOPIC)])].sort();

    const newCategorySelect = document.getElementById('new-category');
    const prevNewCat = newCategorySelect.value;
    newCategorySelect.innerHTML = categoryNames.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    if (categoryNames.includes(prevNewCat)) newCategorySelect.value = prevNewCat;

    const newTopicSelect = document.getElementById('new-topic');
    const prevNewTopic = newTopicSelect.value;
    newTopicSelect.innerHTML = topicNames.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
    if (topicNames.includes(prevNewTopic)) newTopicSelect.value = prevNewTopic;

    const catFilterSelect = document.getElementById('filter-category');
    const prevCatVal = catFilterSelect.value;
    catFilterSelect.innerHTML = '<option value="">Alle Kategorien</option>' + categoryNames.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    catFilterSelect.value = prevCatVal;

    const topicFilterSelect = document.getElementById('filter-topic');
    const prevTopicVal = topicFilterSelect.value;
    topicFilterSelect.innerHTML = '<option value="">Alle Themen</option>' + topicNames.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
    topicFilterSelect.value = prevTopicVal;

    const filtered = applyFilters(questions.map((q, idx) => ({ ...q, _globalIdx: idx })));
    document.getElementById('q-count-filtered').textContent = filtered.length;

    const groups = groupByTopic(filtered);
    const box = document.getElementById('category-groups');
    box.innerHTML = '';

    Object.keys(groups).sort().forEach(topicName => {
      const items = groups[topicName];
      const isOpen = openTopics.has(topicName);

      const groupDiv = document.createElement('div');
      groupDiv.className = 'category-group';

      const header = document.createElement('div');
      header.className = 'category-header' + (isOpen ? ' open' : '');
      header.innerHTML = `
        <span><span class="cat-name">${escapeHtml(topicName)}</span><span class="cat-count">${items.length}</span></span>
        <span class="chevron">▶</span>
      `;
      header.addEventListener('click', () => {
        if (openTopics.has(topicName)) openTopics.delete(topicName);
        else openTopics.add(topicName);
        renderQuestions();
      });
      groupDiv.appendChild(header);

      const body = document.createElement('div');
      body.className = 'category-body' + (isOpen ? ' open' : '');
      if (isOpen) {
        items.forEach(q => {
          const row = document.createElement('div');
          row.className = 'q-row';
          row.innerHTML = `
            <span class="q-topic-tag">${escapeHtml(q.category || DEFAULT_CATEGORY)}</span>
            <div class="q-text">${escapeHtml(q.question)}</div>
            <div class="a-text">✔ ${escapeHtml(String(q.answer))}</div>
            <div class="row-actions">
              <button class="btn btn-secondary btn-edit">Bearbeiten</button>
              <button class="btn btn-secondary btn-delete">Löschen</button>
            </div>
          `;
          row.querySelector('.btn-delete').addEventListener('click', async () => {
            if (!confirm('Diese Frage wirklich löschen?')) return;
            questions = await apiCall(apiBase() + '/' + q._globalIdx, { method: 'DELETE' });
            renderQuestions();
          });
          row.querySelector('.btn-edit').addEventListener('click', () => startEdit(row, q, q._globalIdx));
          body.appendChild(row);
        });
      }
      groupDiv.appendChild(body);
      box.appendChild(groupDiv);
    });
  }

  function startEdit(row, q, idx) {
    const isEstimate = category === 'estimate';
    const categoryNames = [...new Set([...BASE_CATEGORIES, ...questions.map(x => x.category || DEFAULT_CATEGORY)])].sort();
    const topicNames = [...new Set([...BASE_TOPICS, ...questions.map(x => x.topic || DEFAULT_TOPIC)])].sort();
    const currentCat = q.category || DEFAULT_CATEGORY;
    const currentTopic = q.topic || DEFAULT_TOPIC;
    row.innerHTML = `
      <div class="field-row" style="margin-bottom:8px;">
        <select class="q-cat-edit">${categoryNames.map(c => `<option value="${escapeHtml(c)}" ${c === currentCat ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('')}</select>
        <select class="q-topic-edit">${topicNames.map(t => `<option value="${escapeHtml(t)}" ${t === currentTopic ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}</select>
      </div>
      <textarea class="q-question-edit">${escapeHtml(q.question)}</textarea>
      <input class="a-text-edit" type="${isEstimate ? 'number' : 'text'}" step="any" value="${escapeHtml(String(q.answer))}" />
      <div class="row-actions">
        <button class="btn btn-primary btn-save">Speichern</button>
        <button class="btn btn-secondary btn-cancel">Abbrechen</button>
      </div>
    `;
    row.querySelector('.btn-save').addEventListener('click', async () => {
      const cat = row.querySelector('.q-cat-edit').value.trim();
      const topic = row.querySelector('.q-topic-edit').value.trim();
      const question = row.querySelector('.q-question-edit').value.trim();
      const answer = row.querySelector('.a-text-edit').value.trim();
      if (!question || !answer) return;
      questions = await apiCall(apiBase() + '/' + idx, {
        method: 'PUT',
        body: JSON.stringify({ question, answer, category: cat || DEFAULT_CATEGORY, topic: topic || DEFAULT_TOPIC }),
      });
      renderQuestions();
    });
    row.querySelector('.btn-cancel').addEventListener('click', renderQuestions);
  }

  document.getElementById('btn-add-question').addEventListener('click', async () => {
    const cat = document.getElementById('new-category').value.trim() || DEFAULT_CATEGORY;
    const topic = document.getElementById('new-topic').value.trim() || DEFAULT_TOPIC;
    const question = document.getElementById('new-question').value.trim();
    const answer = category === 'estimate'
      ? document.getElementById('new-answer-number').value.trim()
      : document.getElementById('new-answer').value.trim();
    if (!question || !answer) return alert('Bitte Frage und Antwort ausfüllen.');
    questions = await apiCall(apiBase(), {
      method: 'POST',
      body: JSON.stringify({ question, answer, category: cat, topic }),
    });
    document.getElementById('new-question').value = '';
    document.getElementById('new-answer').value = '';
    document.getElementById('new-answer-number').value = '';
    openTopics.add(topic);
    renderQuestions();
  });

  document.getElementById('btn-import').addEventListener('click', async () => {
    const raw = document.getElementById('bulk-import').value;
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    const items = lines.map(line => {
      const parts = line.split(';');
      if (parts.length < 4) return null;
      const [cat, topic, q, ...rest] = parts;
      return { category: cat.trim() || DEFAULT_CATEGORY, topic: topic.trim() || DEFAULT_TOPIC, question: q.trim(), answer: rest.join(';').trim() };
    }).filter(Boolean);

    if (items.length === 0) {
      document.getElementById('import-result').textContent = 'Kein gültiges Format gefunden (Kategorie;Thema;Frage;Antwort pro Zeile).';
      return;
    }
    try {
      questions = await apiCall(apiBase() + '/import', {
        method: 'POST',
        body: JSON.stringify({ items }),
      });
      document.getElementById('import-result').textContent = `${items.length} Fragen importiert.`;
      document.getElementById('bulk-import').value = '';
      renderQuestions();
    } catch (e) {
      document.getElementById('import-result').textContent = 'Fehler: ' + e.message;
    }
  });

  document.getElementById('btn-export').addEventListener('click', () => {
    const filename = category === 'estimate' ? 'estimate_questions.json' : 'questions.json';
    const blob = new Blob([JSON.stringify(questions, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  if (adminKey) loadQuestions();
</script>
</body>
</html>
